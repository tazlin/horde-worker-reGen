services:
  regen:
    # To use the prebuilt image instead of building locally, comment out `build:` and uncomment:
    # image: ghcr.io/haidra-org/horde-worker-regen:latest
    build:
      # Build context is the repo root: the image bakes the source in (see Dockerfile.cuda).
      context: ../
      dockerfile: Dockerfiles/Dockerfile.cuda
      args:
        - CUDA_VERSION=12.8.1
    container_name: reGen
    tty: true
    group_add:
      - video
    volumes:
      - ${AIWORKER_CACHE_HOME:-../models/}:/horde-worker-reGen/models/
      - ${AIWORKER_BRIDGE_DATA_LOCATION:-../bridgeData.yaml}:/horde-worker-reGen/bridgeData.yaml:ro
      - ${AIWORKER_LOGS_DIR:-../logs/}:/horde-worker-reGen/logs/
    stop_grace_period: 2m
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities: [gpu]
            count: all
