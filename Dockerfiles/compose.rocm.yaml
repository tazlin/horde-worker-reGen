services:
  regen:
    # ROCm images are not currently published; build locally.
    build:
      # Build context is the repo root: the image bakes the source in (see Dockerfile.rocm).
      context: ../
      dockerfile: Dockerfiles/Dockerfile.rocm
      args:
        - ROCM_VERSION=6.2.1
    container_name: reGen
    tty: true
    #environment:
    #  - FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
    group_add:
      - video
    volumes:
      - ${AIWORKER_CACHE_HOME:-../models/}:/horde-worker-reGen/models/
      - ${AIWORKER_BRIDGE_DATA_LOCATION:-../bridgeData.yaml}:/horde-worker-reGen/bridgeData.yaml:ro
      - ${AIWORKER_LOGS_DIR:-../logs/}:/horde-worker-reGen/logs/
    stop_grace_period: 2m
    devices:
      - /dev/kfd
      - /dev/dri
