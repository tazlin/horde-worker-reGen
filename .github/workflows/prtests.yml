name: Unstable Tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
    paths:
      - '**.py'
      - '**.json'
      - '.github/workflows/maintests.yml'
      - '.github/workflows/prtests.yml'
      - '.github/workflows/release.yml'
      - '.pre-commit-config.yaml'
      - 'bridgeData_template.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements/**'
      - 'Dockerfiles/**'
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies (including pyrefly)
        run: uv sync --extra cpu --group dev
      - name: Run pre-commit hooks
        run: uv run prek run --all-files

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint CUDA Dockerfile
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: "Dockerfiles/Dockerfile.cuda"
      - name: Lint RoCM Dockerfile
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: "Dockerfiles/Dockerfile.rocm"

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      # The image-utilities capability venv is provisioned with `uv sync --locked` against its own project,
      # so a lock that has drifted from requirements/utilities/pyproject.toml would fail every provision.
      - name: Verify the image-utilities lock is current
        run: uv lock --check --project requirements/utilities
      # The default sweep skips the opt-in `slow` band (real subprocess spawns) so it stays fast; the
      # separate step below runs that band so CI coverage of the full-lifecycle tests is not lost.
      - name: Run unit tests (fast sweep)
        run: uv run pytest
      - name: Run slow tests (real subprocess spawns)
        run: uv run pytest -m slow
