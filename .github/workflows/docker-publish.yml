name: Build and publish Docker image

# Builds the immutable CUDA worker image and publishes it to the GitHub Container Registry (GHCR) at
#   ghcr.io/<owner>/horde-worker-regen
# Pull requests build only (no push) so a broken Dockerfile is caught before it can publish. Pushes to
# main publish :latest, version tags (v*) publish the immutable :X.Y.Z / :X.Y tags, and the workflow
# can be run on demand. The ROCm image is intentionally not published here (no AMD CI/GPU to validate
# it); it stays buildable + linted via maintests.yml.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfiles/**"
      - "pyproject.toml"
      - "uv.lock"
      - "horde_worker_regen/**"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    paths:
      - "Dockerfiles/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-image:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/horde-worker-regen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login for pull_request builds (no push, and forks have no write token).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfiles/Dockerfile.cuda
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
