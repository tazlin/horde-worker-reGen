name: Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '**.json'
      - '.github/workflows/maintests.yml'
      - '.github/workflows/prtests.yml'
      - '.github/workflows/release.yml'
      - '.pre-commit-config.yaml'
      - 'bridgeData_template.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfiles/**'
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies (including pyrefly)
        run: uv sync --extra cpu --group dev
      - name: Run pre-commit hooks
        run: uv run prek run --all-files

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint CUDA Dockerfile
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: "Dockerfiles/Dockerfile.cuda"
      - name: Lint RoCM Dockerfile
        uses: hadolint/hadolint-action@master
        with:
          dockerfile: "Dockerfiles/Dockerfile.rocm"

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Run unit tests
        run: uv run pytest
