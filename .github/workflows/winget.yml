name: Publish to WinGet

# Automated submission to the Windows Package Manager community repo.
#
# PAUSED: winget publishing is intentionally disabled. The publish job below is hard-gated `if: false`, so
# this workflow is a guaranteed no-op even if a `release` is published, `workflow_dispatch` is invoked, or
# the WINGET_ENABLED variable is set to 'true'. Do NOT rely on WINGET_ENABLED alone to keep it off.
# To turn winget publishing back on, follow the runbook in docs/how-to/enable-winget-publishing.md (restore
# the `if:` guard below, set the WINGET_ENABLED variable and WINGET_TOKEN secret, and complete the one-time
# winget-pkgs onboarding). When enabled, the action (winget-releaser, Komac under the hood) reads the
# release's zip asset, computes its hash, and opens the winget-pkgs PR for Haidra.HordeWorker.
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to submit (e.g. v12.0.1)
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # PAUSED hard-off: see docs/how-to/enable-winget-publishing.md. To restore: if: ${{ vars.WINGET_ENABLED == 'true' }}
    if: false
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Haidra.HordeWorker
          installers-regex: 'horde-worker-reGen\.zip$'
          release-tag: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
