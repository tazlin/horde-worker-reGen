## Common for all worker types

# !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!
# See also the readme's "Suggested settings" section for recommended settings.    !!!
# !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!  !!!
#
# The dashboard Config tab is the safest way to edit this file. It groups everyday
# settings separately from advanced ones, previews the process count implied by
# max_threads + queue_size, validates interlocked options before save, and can apply
# hardware presets while letting you opt out of each individual setting change.

# The Horde URL. Do not change this unless you are using a custom Horde.
horde_url: "https://aihorde.net/api/"

# The API key identifies a unique user in the Horde
# Visit https://aihorde.net/register to create one before you can join
api_key: "0000000000"

# List of usernames whose prompts you want to prioritize.
# The owner's username is always included, so you don't need to add it here if you use the key specified in `api_key` for requests.
priority_usernames: []

# Concurrent image jobs: the maximum number of image jobs admitted to sampling at the same time.
# Only high-end cards (e.g., 3080 or better) benefit from this setting.
# If you have a 20xx or earlier, or a xx60/xx70, do not change this setting from 1.
# Cost: each extra thread spawns a whole additional inference process. That process holds a full inference
# context resident, which is multiple GB of VRAM even while idle (the CUDA/runtime baseline), plus the weights
# of whatever model it loads (also multiple GB), and a matching chunk of system RAM. It is not a lightweight
# worker. The worker will not spawn more inference contexts than a card's VRAM physically fits (idle contexts
# plus the heaviest model you offer, net of a small safety buffer); if you configure more than that it silently
# spawns fewer and logs why, and the runtime governor further reduces live concurrency under memory pressure.
max_threads: 1
# Suggested values:
#   24GB+ VRAM: 1 (only increase if you have >32gb system RAM and are *not* offering Flux/Cascade)
#   12GB-16GB VRAM: 1
#   8GB-10GB VRAM: 1

# Preload queue slots: extra jobs/models kept ready so a slot can start quickly.
# Generally should be 1 or 2. Never set this higher than 2 if your max_threads is 2.
# Cost: like max_threads, each queue slot spawns an additional inference process, so it carries the same full
# per-context VRAM and system RAM cost described above (multiple GB each), not a small fixed reservation. Close
# unused programs if you increase this value, and expect the per-card VRAM-fit cap to reduce the spawned count
# on a card that cannot hold every configured context.
queue_size: 1
# Suggested values:
#   >64gb system RAM: 3
#   64gb system RAM: 2
#   32gb system RAM: 0 or 1
#   32gb system RAM and offering Flux/Cascade: 0
#   <32gb system RAM: 0


# Max batch size: number of images in one sampled batch.
# More optimized than doing them one by one but slower.
# Ensure you can generate your max_batch at half your max_power.
max_batch: 1
# Suggested values:
#   24GB+ VRAM: 8 or higher
#   12GB-16GB VRAM: 4 or higher
#   8GB-10GB VRAM: 4 (no higher than 4)

# Run CLIP model (checking for potential CSAM or NSFW) on GPU instead of CPU.
# Enable this on cards with 12GB or more VRAM to increase job completion rate.
# ~1.2GB of VRAM overhead
safety_on_gpu: false
# Suggested values:
#   24GB+ VRAM: true
#   12GB-16GB VRAM: true (consider false if offering Cascade or Flux)
#   8GB-10GB VRAM: false

# Run post-processing (upscalers/face-fixers/background removal) on a dedicated process that keeps
# those models resident, instead of inside the inference processes. This gives post-processing a
# fixed, budgetable VRAM footprint and avoids reloading the models per job.
#   auto: run the lane whenever post-processing is allowed (recommended)
#   on:   always run the lane
#   off:  disable the lane; allow_post_processing must also be false because this worker has no place
#         to run post-processing jobs
dedicated_post_processing: auto

# Only pick up jobs where the user has the required kudos upfront.
# Excludes all anonymous accounts and registered accounts who haven't contributed.
require_upfront_kudos: false



# If true, the worker will clear maintenance mode on startup.
# Warning: While this can be convenient, being put into maintenance mode is a safety feature to prevent workers
# which are not working correctly from taking jobs. If you see this happening frequently, you should investigate
# your logs to determine the cause.
remove_maintenance_on_init: false

# If true, fewer log messages will be printed to the console.
# This is intended for workers running on the cloud or other headless environments.
# We *do not* recommend this setting for most users.
limited_console_messages: false

# Automatic cleanup of the on-disk logs/ directory, run once at each worker start.
# The worker's logs (rotated/zipped bridge*.log and trace*.log archives, plus per-run stdout/stderr,
# startup-crash, console and faulthandler files) would otherwise accumulate without limit over time.
# log_purge_max_age_days: delete any log file older than this many days (0 disables the age-out).
# log_purge_max_total_gb: after the age-out, if the logs/ directory still exceeds this many gigabytes,
#   delete the oldest files first until it fits (0 disables the size cap). Active logs are trimmed last.
log_purge_max_age_days: 30
log_purge_max_total_gb: 5

# Structured stats export (.horde_worker_regen/stats/stats-v*.jsonl), for offline analysis of a run.
# stats_export_enabled: export a machine-readable per-session stats stream (session boundaries, per-job
#   records, periodic samples, resource/decision events) on every start, without the dashboard toggle.
#   Off by default so upgrading never begins writing extra files unprompted.
# stats_purge_max_age_days / stats_purge_max_total_gb: retention for that directory, mirroring the log
#   purge (0 disables the respective stage). Only recognized stats-v* files are ever eligible.
# stats_autozip_enabled: gzip inactive prior-session stats files to .jsonl.gz at startup before purging.
stats_export_enabled: false
stats_purge_max_age_days: 30
stats_purge_max_total_gb: 5
stats_autozip_enabled: true

#######################################
## Dreamer (Stable Diffusion Worker) ##
#######################################

# Worker name for running a Dreamer instance.
# This must be unique across the entire horde!  Do not use the default!
# If you get the error `Wrong credentials to submit as this worker.`, try changing this name, someone else is already using it.
dreamer_name: "An Awesome Dreamer"

# Max resolution: the largest total pixel count this worker will accept.
# Formula: `64 * 64 * 8 * max_power` (total pixels)
# Examples:
# 8  = 512x512
# 18 = 768x768
# 32 = 1024x1024
# 50 = 1280x1280
max_power: 8
# Suggested values:
#   8GB-10GB VRAM: 32 (no higher than 32)
#   12GB-16GB VRAM: 32-64 (no higher than 64)
#   24GB+ VRAM: 64-128 (no higher than 128)

# Fill local queue much faster but may be penalized by the server if you cannot keep up with jobs.
high_performance_mode: false
# Suggested values:
#   24GB+ VRAM: true

# Fill local queue somewhat faster but may be penalized by the server if you cannot keep up with jobs.
# Overridden by high_performance_mode.
moderate_performance_mode: false
# Suggested values:
#   12GB-16GB VRAM: true

# Aggressively unload models from VRAM when not in use.
# Should be true for most workers with GPUs with less than 16GB of VRAM.
unload_models_from_vram_often: true
# Suggested values:
#   24GB+ VRAM: false
#   12GB-16GB VRAM: false
#   8GB-10GB VRAM: true

# Normally only one model will load off disk at a time. Set to true to load multiple models at once.
# This requires a very fast disk. You will see a sharp increase in disk usage, especially with SDXL/Cascade/Flux/other large models.
very_fast_disk_mode: false

# List of words to reject if they appear in the prompt.
blacklist: []

# Serve NSFW images if true.
nsfw: true

# Censor NSFW images if true.
censor_nsfw: false

# List of words to always censor, even if `nsfw` is true.
censorlist: []

# Offer img2img jobs using a user-supplied image.
allow_img2img: true

# Offer inpainting jobs using a user-supplied image and an inpainting-specific model.
# Requires `allow_img2img: true`.
allow_painting: true

# Allow user requests from behind VPNs.
# Note: The worker does not directly interact with user IPs - it only interacts with the StableHorde API.
allow_unsafe_ip: true

# Offer post-processing jobs (upscalers, face-fixers, background removal).
# Requires `dedicated_post_processing` to be `auto` or `on`; setting the lane to `off`
# disables post-processing service for this worker.
allow_post_processing: true
# 8GB-10GB VRAM: false (if offering SDXL or Flux, otherwise true)

# Offer ControlNet jobs.
# Note: Additional RAM/VRAM overhead. Low VRAM cards (<6GB) should be cautious.
allow_controlnet: false

# Offer the extended ControlNet control types (everything beyond the classic set).
# The worker only advertises these once their annotators are actually available (the image-utilities
# lane serves them, or their weight files are on disk), so this is an opt-out, not an opt-in: leave it
# true to serve them as soon as they are ready, or set it false to stay on the classic set and save the
# annotator disk space. Has no effect unless `allow_controlnet: true`.
extended_controlnet: true

# Offer SDXL jobs with high memory add-ons like ControlNet or transparency.
# Note: Significant additional RAM/VRAM overhead. Medium VRAM cards (<12GB) should be cautious.
# Requires `allow_controlnet: true`.
allow_sdxl_controlnet: false
# 16GB+ VRAM: true
# 8GB-10GB VRAM: false

# Offer LoRA jobs. Requires a fast internet connection and a `civitai_api_token`.
# LoRas will be downloaded on demand. `max_lora_cache_size` controls how many gigabytes to keep downloaded.
# 5GB of preselected LoRas are always downloaded the first time you start the worker with this setting.
# Note that there can be a significant delay when downloading LoRas causing GPU downtime.
allow_lora: false

# If set, this worker will use this civitai API token when downloading any resources from civitai.
# This is required in order to provide LoRas/TIs (or other resources)
# which are marked as requiring a civitai token to download.
#
# If you set "models_to_load" to something like "top 5", it is necessary to provide this token,
# as many of the most popular models require it for the download. Downloading many models in bulk
# could also lead to issues if no token is required.
#
# You can get your civitai API Key from https://civitai.com/user/account (look for 'Add API Key')
#
# Remove the # from the line below and add your civitai API token to enable this feature.
# civitai_api_token:

# Delete any unknown LoRas from the loras folder when `download_models.py` is run.
# Warning: This option will delete any LoRas not in the model reference, including custom LoRas.
purge_loras_on_download: false

# Number of gigabytes of LoRas to keep cached. Minimum is 10GB.
max_lora_cache_size: 10

# Keep at least this many gigabytes free on the disk holding the LoRa cache.
# The on-demand LoRa cache is bounded by `max_lora_cache_size`, but a shared disk or other data can
# still push it toward full (where downloads start failing). Below this floor the worker shrinks the
# cache and evicts least-recently-used LoRas to make room for new ones; if it still can't clear the
# floor it stops offering LoRas (with a prominent warning) until disk space is freed. Set to 0 to
# disable this safety floor.
min_lora_disk_free_gb: 1

# Set to true if your worker is extraordinarily slow (below 0.1 mps/s).
# Users can choose to skip it when requesting generations, but job timeout and request expiry timeout are tripled.
extra_slow_worker: false
# Low-end cards or low performance: true

# Only pick up jobs requesting steps lower than the model's average steps.
# Useful for slower workers or if you don't want to serve requests with an extraordinary number of steps.
limit_max_steps: false
# Low-end cards or low performance: true

# Automatically determine the models with the highest queue and offer those.
dynamic_models: false # Currently unused in reGen

# Number of models to offer when `dynamic_models` is true.
number_of_dynamic_models: 0 # Currently unused in reGen

# Maximum number of models to download automatically for `dynamic_models`.
max_models_to_download: 10 # Currently unused in reGen

# Frequency (in seconds) to output worker summary stats, such as kudos per hour.
# Set to zero to disable stats output completely.
stats_output_frequency: 20

# Location where models are stored.
# Left commented by default: the scripted installers keep models in a peered data dir (a sibling of the
# worker folder named <worker>-data, preserved across reinstalls), defaulting to <data>/models. Precedence
# is: an AIWORKER_CACHE_HOME env var wins; else this cache_home; else the peered default. Uncomment and give
# an absolute path to override the model location, or set HORDE_WORKER_DATA_DIR to move the whole data dir.
# cache_home: "./models/"

# Location of the temp directory, also used for the model cache.
temp_dir: "./tmp" # Currently unused in reGen

# Always download models when required without prompting.
always_download: true # Currently unused in reGen

# Disable the terminal GUI, which displays information about the worker and the Horde.
# NOTE: reGen defaults this to true (TUI disabled). Set to false to enable the TUI.
disable_terminal_ui: false

# Obsolete
vram_to_leave_free: "80%" # Currently unused in reGen

# Target amount of system RAM to keep free.
# The worker only makes a best effort. Avoid using too much RAM with other programs.
ram_to_leave_free: "80%" # Currently unused in reGen

# Obsolete
disable_disk_cache: false # Currently unused in reGen

# Models to use.
# Instead of a model name, you may use any of the following magic constants:
#   "ALL" - Load all possible models (over 1TB of space).
#   "TOP n" - Load the top "N" most popular models (e.g., "top 5").
#   "BOTTOM n" - Load the bottom "N" models (e.g., "bottom 5").
#   "ALL SD15 MODELS" - All Stable Diffusion 1.5 models.
#   "ALL SD21 MODELS" - All Stable Diffusion 2.0/2.1 models.
#   "ALL SDXL MODELS" - All Stable Diffusion XL models.
#   "ALL INPAINTING MODELS" - All models marked for inpainting.
#   "ALL SFW MODELS" - All models marked as SFW.
#   "ALL NSFW MODELS" - All models marked as NSFW.
#
# The official model reference (in JSON format) is at https://github.com/Haidra-Org/AI-Horde-image-model-reference/blob/main/stable_diffusion.json.
# The model name must match the name in the model reference or be a magic constant.
# If you use `TOP` or `ALL` load commands, set a `civitai_api_token`; many popular models require it
# and the Config tab blocks saving meta-load rules without one.
#
# SD15 models are generally 1-2GB each, SD21 models are generally 5-37B each, and SDXL models are generally 7B each.
# Flux.1-Schnell fp8 (Compact) is 17GB, and Cascade is 14gb total.
#
#
# Important note: models_to_skip are only removed and other models are *not* added back in.
#                 If you set `TOP 10`, and add `Flux.1-Schnell fp8 (Compact)` to `models_to_skip`,
#                 you will only have 9 models loaded.
#
models_to_load:
    - "top 2"
    #- "ALL MODELS"
    #- "TOP 3"
    #- "ALL SFW"
    #- "Flux.1-Schnell fp8 (Compact)"
    #- "stable_diffusion"
    #- "Anything Diffusion"
    #- "stable_diffusion_inpainting" # requires `allow_painting` to be true
# <32gb RAM:
  # Only SD15 models (set `load_large_models: false` and add SDXL, SD21, and all of the "Un-pruned" models to your `models_to_skip` below if using TOP/ALL commands)
  # Be sure to set your queue_size to 0
# 32gb+ RAM, 8GB VRAM:
  # SD15, SD21
  # If running SDXL
  # If running Flux, be sure to free up as much VRAM as possible before starting the worker.
# 32gb+ RAM, 10GB+ VRAM:
  # All model types can be run.


# If you use a meta command, such as ALL or TOP n, you can allow very large models, such as cascade or flux to be included.
# By default, these models are excluded due to their large size.
# Set to true if have a 24GB card and want to include these models.
# Otherwise, I suggest including the models you know you can handle manually.
load_large_models: false

# Only offer models that are already downloaded. When true, any model your load rules resolve to
# (a literal name, or an expansion of a TOP/ALL command) that is not already on disk is dropped instead
# of being downloaded. Useful to pin the served set to what you have without curating an explicit list,
# and guarantees a config change never kicks off a large download. Default: false.
only_models_on_disk: false

# Models to skip when `dynamic_models` is true or TOP n models are selected in models_to_load.
# Avoid loading models due to VRAM constraints, NSFW content, or other reasons.
# Models skipped are not replaced by other models, meaning TOP n will load fewer models. See the note above models_to_load.
models_to_skip:
  - "pix2pix" # Not currently supported
  - "SDXL_beta::stability.ai#6901" # Do not remove this, as this model would never work
  - "A to Zovya RPG" # This model is known to cause problems with reGen
  # - "Stable Cascade 1.0" # This a *very* VRAM intensive model
  # - ALL NSFW MODELS
  #- "stable_diffusion_inpainting"  # Inpainting is generally quite heavy along with other models for smaller GPUs.
  #- "ALL SD21"  # Stable diffusion 2.1 has bigger memory requirements than 1.5, so if your card cannot lift, it, disable it
  # - HASDX # Un-pruned SD1.5 model (5gb+)
  # - Anygen # Un-pruned SD1.5 model (5gb+)
  # - PFG # Un-pruned SD1.5 model (5gb+)
  # - Poison # Un-pruned SD1.5 model (5gb+)
  # - MoistMix # Un-pruned SD1.5 model (5gb+)
  # - Laolei New Berry Protogen Mix # Un-pruned SD1.5 model (5gb+)

# Suppress speed warnings if jobs are taking too long.
# Note: If you are getting these messages, you are serving jobs much slower than ideal.
# Lower your max_power for more kudos/hr.
suppress_speed_warnings: false

# Exit if an unhandled fault occurs. Useful for setting up the worker as a system service.
exit_on_unhandled_faults: false

#########################
## Scribe (LLM Worker) ##
#########################

# Note: Scribe is not currently supported in reGen. This section is for future use.
# Use https://github.com/Haidra-Org/AI-Horde-Worker to run a Scribe worker.

# Worker name for running a Scribe worker.
# This must be unique across the entire horde!  Do not use the default!
# If you get the error `Wrong credentials to submit as this worker.`, try changing this name, someone else is already using it.
scribe_name: "An Awesome Scribe"

# KoboldAI Client API URL.
kai_url: "http://localhost:5000"

# Max tokens to generate with this worker.
max_length: 80

# Max tokens to use from the prompt.
max_context_length: 1024

# Append the Horde alias behind the API key to the model advertised to the Horde.
# Prevents the model from being used from the shared pool but ensures no other worker can pretend to serve it.
branded_model: true

#########################
## Alchemist (Image Interrogation and Post-Processing)
#########################

# Set to false to deliberately run an alchemist-only worker (no image generation) on a GPU box.
# Leave it true (the default) for the usual dreamer or dreamer+alchemist worker. The role matrix:
#   dreamer: true,  alchemist: false  -> image generation only (the default)
#   dreamer: true,  alchemist: true   -> both image generation and alchemy
#   dreamer: false, alchemist: true   -> alchemy only (one inference process for graph forms)
#   dreamer: false, alchemist: false  -> nothing to serve (the Config tab blocks this combination)
# A CPU-only install cannot serve image generation regardless of this flag, so it always runs
# alchemist-only there.
dreamer: true

# Set to true to also serve alchemy (interrogation) jobs alongside image generation.
# Image jobs always take priority. By default (alchemy_allow_concurrent) alchemy may run
# concurrently with image generation when a process lane is spare and there is VRAM
# headroom; otherwise it waits. Graph forms (upscalers, facefixers, strip_background) run
# on the inference processes (shared with image generation); CLIP forms (interrogation,
# nsfw, caption) run on the safety process. Set alchemist: true together with dreamer: false
# for an alchemist-only worker.
alchemist: false

# Worker name for serving alchemy jobs.
# This must be unique across the entire horde!  Do not use the default!
# If you get the error `Wrong credentials to submit as this worker.`, try changing this name, someone else is already using it.
alchemist_name: "An Awesome Alchemist"

# Alchemy forms this worker can serve. If unset, all of them are offered.
forms:
  - "caption"
  - "nsfw" # Uses CPU
  # Heavier than the others, but rewards more kudos
  - "interrogation"
  - "post-process"

# Caption forms load BLIP into the safety process on first use, which costs significant
# additional RAM/VRAM, so captioning requires this explicit opt-in even when "caption"
# is listed in forms.
alchemy_caption_enabled: false

# Allow alchemy to run alongside image generation instead of only as backfill.
# When true, alchemy may pop while image jobs are queued, but only into a spare process
# lane (no waiting image job needs it) and only with VRAM headroom for a typical alchemy
# form. Set to false to restrict alchemy to popping only when the image queue is empty.
alchemy_allow_concurrent: true

# Maximum number of alchemy forms allowed in flight at once. Raise on machines with spare
# compute/VRAM to run more alchemy concurrently with image generation.
alchemy_max_concurrency: 1

# Cold-start floor (MB) for an alchemy form's predicted VRAM cost. Alchemy shares the same
# committed-reserve accounting as image generation: a form is popped only when EFFECTIVE free
# VRAM (measured free minus VRAM already committed by in-flight image and alchemy work) covers
# the form's predicted cost. The prediction starts at this floor and rises toward the observed
# median cost of recent forms as measurements accumulate.
alchemy_vram_headroom_mb: 2000

# Minimum effective available system RAM (MB) required before popping an alchemy form (graph forms keep
# weights resident in RAM). The RAM analogue of alchemy_vram_headroom_mb; keeps alchemy from pushing a
# memory-resident worker into paging.
alchemy_ram_headroom_mb: 2048

##########################################
## reGen Advanced Settings              ##
##########################################

# If true, the process will stop and restart when the model loaded changes.
# Warning: This can cause substantial delays in processing.
cycle_process_on_model_change: false

#############################
## Timeouts & Retry Limits ##
#############################

# Maximum time (seconds) to allow a job to run before it is killed.
# High-performance mode divides this by 3; moderate-performance mode divides by 2.
process_timeout: 300

# Maximum time (seconds) for post-processing (e.g. upscaling, face-fixing) before the job is killed.
post_process_timeout: 60

# Maximum time (seconds) to allow a model to load from disk into VRAM before the process is killed.
preload_timeout: 80

# Maximum time (seconds) a single sampling step may make no progress before the process is killed as hung.
inference_step_timeout: 20

# Maximum time (seconds) for a job's first sampling step, which also covers the cold work preceding it
# (streaming a large model's components through VRAM, the initial prompt encode). This is legitimately
# far longer than a steady step; raise it if heavy models (e.g. Flux) are killed during their first step.
inference_first_step_timeout: 90

# Per-step hang timeout (seconds) for a slot doing legitimate but heartbeat-silent heavy work: a step
# stretched by multi-process co-residence contention, or a feature phase that emits no sampling step
# (hires-fix second pass, VAE decode, post-processing, a ControlNet graph). The watchdog widens the
# per-step grace up to this value when there is evidence of such work; a genuinely wedged slot is still
# reaped once continuously silent past it. Raise it if heavy/contended jobs are still false-killed.
contended_step_timeout: 120

# How many times a slot may report the SAME sampling step without advancing before it is reaped. Catches
# a wedge the time-based timeouts cannot see: when ComfyUI loops on a single step (in practice the final
# step, after a corrupt/incompatible model+LoRA combination) the slot keeps emitting heartbeats, so it
# never looks silent, yet it never returns a result. A healthy job reports each step exactly once, so any
# sustained repeat is anomalous. Lower for faster recovery; raise if a legitimate pipeline re-reports a
# step a few times before advancing.
inference_stuck_step_repeat_limit: 20

# Maximum time (seconds) to allow an auxiliary model (LoRA, etc.) to download before it is killed.
download_timeout: 121

# How many times a single job may be dispatched to inference before it is reported faulted.
# 1 = no retry (one shot, then fault). 2 (default) = one bounded retry.
# A resource (out-of-memory) failure spends its retry in a degraded, isolated dispatch.
max_inference_attempts: 2

# After this many minutes of accumulated idle time, log a low-demand advisory. This never stops the
# worker (it does not exit when idle); it is only a reminder that demand is low. 0 (default) disables it.
minutes_allowed_without_jobs: 0

# Percent chance (0.0 to 1.0) that the currently loaded models will be favored when popping a job.
# Higher values keep the same model loaded longer, reducing model switches at the cost of throughput.
# NOTE: the config key is `model_stickiness` (the model field is horde_model_stickiness, but its bind
# alias is model_stickiness). Using `horde_model_stickiness:` here is silently ignored (stays 0.0).
model_stickiness: 0.0

#############################
## GPU Sampling Lease      ##
#############################

# Coordinate the GPU denoising loop across inference processes with a shared lease.
# When true, at most `gpu_sampling_lease_slots` processes run the denoising loop at once;
# extra processes stage their next pipeline concurrently, keeping the GPU busy between jobs.
# Trades extra resident memory for higher GPU utilization. Counterproductive with
# unload_models_from_vram_often: true (no staged residency to overlap).
gpu_sampling_lease_enabled: false

# How many inference processes may run the GPU denoising loop at once when
# `gpu_sampling_lease_enabled` is true. Leave unset (the default) to track max_threads, so enabling
# the lease never samples fewer jobs at once than the worker runs concurrently. Set an explicit value
# to override: 1 serializes denoising (efficient on no-MPS/Windows WDDM hardware, where concurrent
# denoise loops only time-slice), higher values permit that many concurrent loops. No effect unless
# the lease is enabled.
# gpu_sampling_lease_slots: 1

#############################
## VRAM / RAM Budget       ##
#############################

# Gate model preloads and concurrent dispatch on a measured VRAM budget. When true (default),
# the worker refuses to preload a model or stage another concurrent job unless the device's
# measured free VRAM covers the job's estimated peak plus vram_reserve_mb, and it evicts the
# coldest idle resident model under pressure. This is the proactive guard against multiple
# inference processes over-committing a shared GPU (the cause of out-of-memory crashes). Set
# false only to restore the prior availability-only behavior.
enable_vram_budget: true

# Free VRAM (MB) the budget keeps in reserve on top of a job's estimated peak. Covers transient
# spikes the steady-state estimate misses, most notably tiled VAE decode. Larger values trade
# throughput for safety. Only used when enable_vram_budget is true.
vram_reserve_mb: 2048

# Available system RAM (MB) the budget keeps in reserve so resident-in-RAM models do not force
# the OS to page to disk. Only used when enable_vram_budget is true.
ram_reserve_mb: 4096

# Absolute system-RAM danger floor (degrade, never crash). Distinct from ram_reserve_mb (a marginal,
# per-job admission reserve): when whole-host RAM usage reaches this percentage, the worker stops admitting
# new model loads, sheds idle resident inference processes, and pauses job pops until RAM recovers, instead
# of loading a model's weights through an out-of-RAM host and being killed by the kernel OOM-killer. The
# effective floor is the more conservative of this percentage and ram_pressure_min_free_mb, so a large-RAM
# host is protected by the percentage and a small-RAM host by the absolute floor. A resident inference
# process can allocate several GB in a single step (a batch decode, or a fresh checkpoint routed through RAM),
# so the default leaves ~15% of RAM free for that step. Only used with enable_vram_budget.
ram_pressure_pause_percent: 85.0

# Minimum free system RAM (MB) below which the worker degrades, regardless of ram_pressure_pause_percent.
# On a small-RAM host the percentage can resolve to too few MB to load safely, so the worker also degrades
# whenever free RAM drops below this. Effective floor = max((100 - ram_pressure_pause_percent)% of total
# RAM, this). Only used with enable_vram_budget.
ram_pressure_min_free_mb: 1024

# Resident system RAM (MB) one inference process may hold before it becomes a reclaim candidate *while the
# host is under its RAM danger floor*. A worker that keeps model weights resident accumulates them per process,
# and the allocator does not return those pages to the OS without a respawn; on a multi-process / multi-GPU
# host a single process can balloon past what the shared pool holds beside its siblings and any co-tenants
# (an alchemist, a scribe), the shape that drives an OS OOM kill. When over this ceiling under pressure, an
# idle process is recycled immediately and a busy one is drained (fed no new work) then recycled once its job
# finishes. Only consulted under the danger floor, so a roomy host never recycles needlessly. 0 disables.
# Only used with enable_vram_budget.
ram_per_process_max_mb: 18432

# Disable post-processing on this worker after repeated post-processing VRAM-over-commit faults. A peak that
# cannot be hosted faults the job (the horde reissues it), but a worker that keeps faulting trips the horde's
# forced maintenance. When true (default), post-processing over-commit faults (the planner's unhostable-peak
# faults and watchdog-reaped post-processing stalls) are counted in a rolling window; once they exceed
# post_processing_fault_threshold within post_processing_fault_window_seconds the worker stops advertising
# post-processing and logs an advisory to downgrade settings. Session-latched: it clears only on restart
# (the over-commit is structural).
post_processing_fault_breaker_enabled: true

# The breaker trips when *more than* this many post-processing over-commit faults occur within
# post_processing_fault_window_seconds (the default tolerates 4 and trips on the 5th). Only used when
# post_processing_fault_breaker_enabled is true.
post_processing_fault_threshold: 4

# Rolling window (seconds) over which post_processing_fault_threshold is counted. Only used when
# post_processing_fault_breaker_enabled is true.
post_processing_fault_window_seconds: 1800

# Run a model admitted *against* the VRAM budget (a best-effort head-of-queue admit) with the device
# to itself. On a small-VRAM card a heavy model (e.g. a Flux combined checkpoint) only fits if nothing
# else is resident; running it exclusively (evicting other residents, suppressing concurrent staging)
# stops its weights spilling to system RAM and being killed as a hang. Only used with enable_vram_budget.
overbudget_exclusive_mode: true

# Give a model whose weights+activations need most of the card sole residency *before* it streams. On a
# small-VRAM card (e.g. Flux on 16GB) the scheduler stops idle inference processes (their fixed CUDA
# contexts, ~1GB each, only freed by the process exiting) and evicts other residents so the heavy model
# loads fully resident and samples at full speed instead of spilling activations to system RAM. Only used
# with enable_vram_budget.
whole_card_exclusive_residency: true

# When a whole-card model claims the device, also move the safety process off-GPU (cpu_only) for the
# job's duration, freeing its ~1GB CUDA context. On a 16GB card this is what lets Flux fit without
# streaming. Restored after. Only used with enable_vram_budget and safety_on_gpu.
whole_card_residency_safety_off_gpu: true

# How long to hold a whole-card residency in place after its last heavy job drains, before restoring full
# concurrency and safety-on-GPU. A whole-card event is disruptive (stops processes, cycles safety), so a
# burst of heavy jobs should reuse one residency rather than each churning a teardown/restore. During the
# cooldown the worker stays in single-residency mode, so a follow-on heavy job runs immediately with no
# churn. 0 restores immediately (most responsive, most churn). Only used with enable_vram_budget.
whole_card_residency_cooldown_seconds: 45

# Minimum seconds between accepting jobs for *different* very-large models (Flux/Cascade/Qwen/Z-Image and
# the named VRAM-heavy checkpoints). A queue that alternates distinct very-large models forces a fresh
# whole-card teardown and a multi-GB checkpoint reload on every switch. Above 0, once a very-large model is
# loaded or queued the worker stops *offering* a different very-large model until this many seconds have
# elapsed since the last distinct large model was introduced (the model already in play is unaffected; no
# job is dropped). An idle worker with an empty queue offers large models again regardless, so it never
# sits idle. 0 disables (the default).
large_model_switch_min_seconds: 0

# Seconds to avoid *any* very-large model after the last one drains. Once the whole-card residency lease is
# up and no very-large model remains loaded or queued, the worker does ordinary work for this long before
# it is allowed back into large-model territory, instead of immediately re-thrashing. -1 (the default)
# inherits whole_card_residency_cooldown_seconds; 0 disables; a positive value overrides. Independent of
# whole_card_exclusive_residency.
large_model_reentry_cooldown_seconds: -1

# Per-step hang timeout (seconds) for a job admitted against the VRAM budget. Such a heavy job can
# stream weights through VRAM each step, so its steps are legitimately far slower than a normal step;
# this generous grace lets it complete instead of being killed. Floored at inference_step_timeout.
overbudget_step_timeout: 120

# Consecutive over-budget terminal faults for one model before it is treated as locally unservable and
# held back (not popped, not admitted) for unservable_model_cooldown_seconds, so the worker stops
# dropping jobs it cannot run faster than the horde tolerates. A successful generation resets it. 0 = off.
unservable_model_fault_threshold: 3

# How long a model flagged locally unservable is held back before the worker tries it again.
unservable_model_cooldown_seconds: 900

# Backstop above the per-model breaker: terminal resource/OOM faults across all models within
# self_maintenance_window_seconds before the worker pauses popping itself (in-flight jobs finish) for
# self_maintenance_cooldown_seconds, so it never trips the horde's "dropping too many jobs" guard. 0 = off.
self_maintenance_fault_threshold: 6
self_maintenance_window_seconds: 600
self_maintenance_cooldown_seconds: 300

# Keep ComfyUI's smart memory management on so inference children hold model weights resident in VRAM
# across jobs. When true, a back-to-back same-model job reuses the resident UNet/CLIP/VAE instead of
# re-uploading them from RAM. False (the default) restores per-job offloading: cross-process residency is
# not yet reconciled at dispatch time, so on tight cards a sampling peak beside an idle sibling's resident
# weights overcommits the device faster than the reclaim ladder can evict, and the driver demotes VRAM to
# system memory (a card-wide slowdown far costlier than the transfers residency saves). Enable only for
# experimentation on cards with headroom well above one sampling peak plus one resident model.
comfy_smart_memory: false

#############################
## Model Downloads         ##
#############################

# Cap background model downloads to this many KB/s (unset or 0 = unlimited).
# Approximate: enforced at 16 MB-chunk granularity.
# download_rate_limit_kbps:

# How many connections to use for a single large model file (default 4; 1 = single stream).
# A large checkpoint is fetched over this many ranged connections at once to raise its download rate;
# small files and hosts that ignore Range requests fall back to one stream automatically.
# WARNING: a multi-connection (value > 1) download CANNOT be resumed. If it is interrupted (restart,
# network drop, crash), the partial file is discarded and the whole file is re-downloaded from scratch.
# Set this to 1 on a slow/unreliable connection to keep resumable, single-stream downloads.
# download_connections_per_file: 4

# If true, background model downloads are held until resumed.
# Honored on config reload; overridable live from the TUI.
downloads_paused: false

# Additional directories to search for already-downloaded model files.
# Each entry should be laid out like the primary model folder (containing compvis/, lora/, etc.).
# New downloads always target the primary root.
# Also settable via the AIWORKER_EXTRA_MODEL_DIRECTORIES env var (os.pathsep-separated).
extra_model_directories: []

#############################
## Custom Models           ##
#############################

# Define custom models not in the official model reference.
# Each entry requires: name, baseline, filepath.
# Example:
# custom_models:
#   - name: "my-custom-model"
#     baseline: "stable_diffusion_1"
#     filepath: "/path/to/model.safetensors"
custom_models: []

#############################
## Kudos Training Data     ##
#############################

# Capture telemetry for kudos model training.
capture_kudos_training_data: false

# File path to write kudos training data to (only used when capture_kudos_training_data is true).
# kudos_training_data_file:

#############################
## Multi-GPU (per-card)    ##
#############################

# SINGLE-GPU USERS: ignore this whole section. It only takes effect when one worker drives more than
# one card; on a single-GPU machine these settings are unused and the global config above applies as-is.
#
# One worker can drive every GPU on the machine under a single horde identity. By default it auto-detects
# and uses all of them. The settings below are far easier to manage from the TUI's Config > Per-GPU tab,
# which exposes every per-card knob with inherit/override toggles; this block documents the file format.

# Which physical cards this worker drives, by stable PCI index (CUDA_DEVICE_ORDER=PCI_BUS_ID). Leave unset
# to drive every detected GPU; set an explicit list to pin or subset them.
# gpu_device_indices:
#   - 0
#   - 1

# Local-queue imbalance fraction (0.0-1.0) that switches the next job pop from the union of all cards to a
# single under-fed card. 0 always targets the most starved card; 1 disables targeting. Default 0.5.
# gpu_pop_balance_threshold: 0.5

# Per-card deltas over the global config, keyed by the same stable device index. Each card sets ONLY the
# fields it wants to differ; everything else inherits the global value. A card with no entry inherits
# wholesale. Overridable per card: max_threads, queue_size, high_performance_mode, moderate_performance_mode,
# extra_slow_worker, preload_timeout, models_to_load, models_to_skip, dynamic_models, allow_lora,
# allow_controlnet, allow_sdxl_controlnet, allow_post_processing, allow_painting, allow_img2img, nsfw,
# max_power, enable_vram_budget, vram_reserve_mb, vram_to_leave_free, whole_card_exclusive_residency.
# gpu_overrides:
#   0:
#     max_threads: 2
#     high_performance_mode: true
#   1:
#     allow_lora: false
#     models_to_load:
#       - "top 3"

#############################
## Dry-Run / Testing       ##
#############################

# Skip real GPU inference and return a dummy 1x1 image instead.
dry_run_skip_inference: false

# Skip the safety (NSFW/CSAM) evaluation model.
dry_run_skip_safety: false

# Skip API calls (job pop and submit) and use canned scenarios.
dry_run_skip_api: false

# Seconds to sleep when dry-run inference is active, simulating work.
dry_run_inference_delay: 1.0
