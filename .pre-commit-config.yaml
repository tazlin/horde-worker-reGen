repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
    -   id: black
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
    -    id: ruff
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.14.1'
    hooks:
    -   id: mypy
        args: []
        additional_dependencies:
        - pydantic==2.9.2
        - types-requests
        - types-pytz
        - types-setuptools
        - types-urllib3
        - StrEnum
        - types-pillow
        - types-pyyaml
        - types-pygments
        - types-colorama
        - types-psutil
        - types-pywin32
        - types-tabulate
        - types-tqdm
        - types-regex
        - pytest
        - loguru
        - python-dotenv
        - aiohttp
        - horde_safety==0.3.0
        - torch==2.9.1
        - ruamel.yaml
        - horde_engine>=3.0.0,<4.0.0
        - horde_sdk~=0.20.6
        - horde_model_reference>=5.1.1,<6.0.0
        - semver
        - logfire>=4.6.0
        - textual>=2.1.0
        - textual-serve>=1.1.1
        - certifi
        - babel
        - qrcode==7.4.2
        - python-Levenshtein
        - aiodns>=3.0.0
        - typing_extensions
        - requests
