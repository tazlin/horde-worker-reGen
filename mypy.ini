[mypy]
mypy_path = .
exclude=dist|build|env|venv|conda

[mypy-xformers.*]
ignore_missing_imports = True

[mypy-ruamel.*]
ignore_missing_imports = True

# Windows-only tray extra (tui/tray.py); absent on other platforms and on a base install, so the
# type checker must tolerate it being unimportable everywhere.
[mypy-pystray.*]
ignore_missing_imports = True
